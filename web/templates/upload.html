{% extends "base.html" %}
{% block content %}
<h2 style="margin-bottom:1.5rem;">Upload a book</h2>
<form hx-post="/api/upload" hx-encoding="multipart/form-data" hx-indicator="#spinner">
  <label>EPUB file
    <input type="file" name="file" accept=".epub" required>
  </label>

  <label>Target language
    <select name="target_lang" required>
      <option value="">Select…</option>
      <option value="pt">Portuguese</option>
      <option value="en">English</option>
      <option value="de">German</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="it">Italian</option>
      <option value="nl">Dutch</option>
      <option value="pl">Polish</option>
      <option value="ru">Russian</option>
      <option value="ja">Japanese</option>
      <option value="zh">Chinese</option>
    </select>
  </label>

  <label>CEFR level
    <select name="cefr_level" required>
      <option value="">Select…</option>
      <option value="A1">A1 — Beginner</option>
      <option value="A2">A2 — Elementary</option>
      <option value="B1">B1 — Intermediate</option>
      <option value="B2">B2 — Upper-intermediate</option>
      <option value="C1">C1 — Advanced</option>
      <option value="C2">C2 — Mastery</option>
    </select>
  </label>

  <label>Source language <span style="color:#888;">(optional — auto-detected if blank)</span>
    <input type="text" name="source_lang" placeholder="e.g. de">
  </label>

  <label>Voucher code <span style="color:#888;">(optional)</span>
    <input type="text" name="voucher" placeholder="Enter code">
  </label>

  <button type="submit" class="btn" style="margin-top:1.5rem;">Upload &amp; preview</button>
  <span id="spinner" class="htmx-indicator" style="margin-left:.75rem; color:#555;">Uploading…</span>
</form>
{% endblock %}
