<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gunnlod</title>
  <script src="https://unpkg.com/htmx.org@2" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #fafafa; color: #111; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid #e5e5e5; background: #fff; }
    nav .logo { font-weight: 700; font-size: 1.2rem; text-decoration: none; color: #111; }
    nav a { text-decoration: none; color: #555; margin-left: 1rem; }
    nav a:hover { color: #111; }
    main { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .btn { display: inline-block; padding: .5rem 1.25rem; background: #111; color: #fff; border-radius: 6px; text-decoration: none; font-size: .9rem; cursor: pointer; border: none; }
    .btn:hover { background: #333; }
    .btn-secondary { display: inline-block; padding: .5rem 1.25rem; background: #fff; color: #111; border: 1px solid #ccc; border-radius: 6px; text-decoration: none; font-size: .9rem; cursor: pointer; }
    input, select { width: 100%; padding: .5rem .75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; margin-top: .25rem; }
    label { font-size: .9rem; font-weight: 500; display: block; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .75rem; border-bottom: 1px solid #e5e5e5; }
    th { font-size: .85rem; color: #555; }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="/">gunnlod</a>
    <div>
      <a href="/login">Login</a>
      <a href="/signup">Sign up</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
