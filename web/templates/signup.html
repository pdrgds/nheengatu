{% extends "base.html" %}
{% block content %}
<div style="max-width:400px; margin:3rem auto;">
  <h2 style="margin-bottom:1.5rem;">Create account</h2>
  <div id="success-msg" style="display:none; background:#f0faf0; border:1px solid #8c8; border-radius:6px; padding:1rem; margin-bottom:1rem;">
    Check your email to confirm your account.
  </div>
  <form id="signup-form">
    <label>Email
      <input type="email" id="email" required autocomplete="email">
    </label>
    <label>Password
      <input type="password" id="password" required autocomplete="new-password" minlength="8">
    </label>
    <div id="error-msg" style="color:#c00; font-size:.9rem; margin-top:.5rem; display:none;"></div>
    <button type="submit" class="btn" style="margin-top:1.25rem; width:100%;">Sign up</button>
  </form>
  <p style="text-align:center; margin-top:1rem; font-size:.9rem;">
    Already have an account? <a href="/login">Log in</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient('{{ supabase_url }}', '{{ supabase_anon_key }}');

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await sb.auth.signUp({ email, password });
    if (error) {
      const el = document.getElementById('error-msg');
      el.textContent = error.message;
      el.style.display = 'block';
      return;
    }
    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  });
</script>
{% endblock %}
